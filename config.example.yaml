# ===================================================================
# YGVPN 部署配置文件
# 复制为 config.yaml 并填入实际值
# ===================================================================

# --- 目标服务器 ---
server:
  name: "vn"                    # 服务器标识（用于日志/文件名）
  ip: "__SERVER_IP__"          # 服务器公网 IP
  # ssh 凭据不在本文件中，从外部 servers.json / 环境变量注入

# --- sing-box 配置 ---
singbox:
  hysteria2_port_range: "40000:41000"

# --- 域名分流（WARP-IPv6） ---
split_domains:
  - google.com
  - youtube.com
  - gmail.com
  - googleapis.com
  - blogspot.com
  - chatgpt.com
  - claude.ai
  - gemini.google.com
  - openai.com
  - perplexity.ai
  - netflix.com
  - disneyplus.com
  - spotify.com
  - hulu.com
  - hbomax.com
  - github.com
  - gitlab.com
  - stackoverflow.com
  - docker.com
  - npmjs.com
  - twitter.com
  - x.com
  - facebook.com
  - instagram.com
  - reddit.com
  - discord.com
  - t.me
  - wikipedia.org
  - medium.com
  - quora.com
  - patreon.com
  - twitch.tv

# --- Telegram 推送 ---
telegram:
  bot_token: "__TG_BOT_TOKEN__"     # 从 @BotFather 获取
  chat_id: "__TG_CHAT_ID__"         # 目标用户/群组 ID
  # 订阅链接中的 SERVER_IP / SUBPORT / SUBTOKEN 在部署时自动替换
